<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORYGIN | Tracker</title>
    <!-- Montserrat Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            base: '#0b0f14',
                            secondary: '#0f1720',
                            blue: '#3b82f6',
                            blueDark: '#2563eb',
                            blueLight: '#60a5fa',
                            input: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="tracker.css">
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center selection:bg-brand-blue selection:text-white p-6">
    
    <div class="glass-card w-full max-w-2xl p-8 text-center relative overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-brand-blue/20 blur-[80px] rounded-full z-[-1]"></div>
        
        <h2 class="text-2xl font-bold tracking-widest text-white mb-6 uppercase text-glow border-b border-white/10 pb-4">Live Violation Tracker</h2>
        
        <!-- Controls -->
        <div class="mb-8 flex justify-between items-center gap-4">
            <button id="trigger-scan-btn" class="flex-grow bg-brand-blue hover:bg-brand-blueDark text-white py-3 rounded-lg font-bold tracking-wider transition-all uppercase shadow-lg">
                🚀 Trigger Global Scan
            </button>
            <button id="refresh-btn" class="p-3 bg-brand-input border border-white/10 rounded-lg text-white hover:bg-brand-secondary transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
        </div>

        <div id="status-display" class="hidden mb-6 p-3 bg-brand-blue/10 border border-brand-blue/20 rounded-lg text-brand-blueLight text-sm font-medium">
            System scanning global networks...
        </div>

        <!-- Violations List -->
        <div id="violations-container" class="space-y-4 text-left max-h-[400px] overflow-y-auto pr-2">
            <div class="text-center text-gray-500 py-8 italic">No scans performed yet.</div>
        </div>

        <div class="mt-8 flex gap-4">
            <a href="photo_dashboard.html" class="flex-grow text-center border border-white/10 text-gray-400 py-3 rounded-xl hover:text-white hover:border-white/20 transition-all text-xs tracking-widest uppercase">
                Return to Portal
            </a>
            <button onclick="window.close()" class="flex-grow bg-brand-secondary border border-red-500/30 text-red-400 py-3 rounded-xl font-bold tracking-widest text-xs transition-all uppercase">
                Close Tracker
            </button>
        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('trigger-scan-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const container = document.getElementById('violations-container');
        const statusDisplay = document.getElementById('status-display');

        async function fetchViolations() {
            try {
                const res = await fetch('/violations');
                const data = await res.json();
                renderViolations(data);
            } catch (err) {
                console.error("Fetch failed:", err);
            }
        }

        function renderViolations(violations) {
            if (!violations || violations.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8 italic">No active violations detected. System secure.</div>';
                return;
            }

            container.innerHTML = violations.map(v => `
                <div class="bg-brand-input/50 p-4 rounded-lg border border-red-500/20 hover:border-red-500/40 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-red-400 tracking-tighter uppercase px-2 py-0.5 bg-red-400/10 rounded">
                            ${v.platform} Violation
                        </span>
                        <span class="text-[10px] text-gray-500 font-mono">Risk: ${v.risk_score || 85}%</span>
                    </div>
                    <p class="text-sm font-semibold text-white truncate mb-1">${v.violating_url}</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-[9px] text-gray-500 uppercase tracking-widest">Status: ${v.status}</span>
                        <button class="text-[10px] text-brand-blueLight hover:underline font-bold uppercase tracking-widest">Generate DMCA</button>
                    </div>
                </div>
            `).join('');
        }

        scanBtn.addEventListener('click', async () => {
            scanBtn.disabled = true;
            scanBtn.textContent = '🔍 Scanning Platforms...';
            statusDisplay.classList.remove('hidden');
            
            try {
                const res = await fetch('/crawl/trigger', { method: 'POST' });
                const result = await res.json();
                alert(result.message);
                await fetchViolations();
            } catch (err) {
                alert("Crawler Error: Connection to detection engine lost.");
            } finally {
                scanBtn.disabled = false;
                scanBtn.textContent = '🚀 Trigger Global Scan';
                statusDisplay.classList.add('hidden');
            }
        });

        refreshBtn.addEventListener('click', fetchViolations);

        // Initial Load
        document.addEventListener('DOMContentLoaded', fetchViolations);
    </script>
</body>
</html>
