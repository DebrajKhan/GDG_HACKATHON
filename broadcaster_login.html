<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORYGIN | Broadcaster Registration</title>
    <!-- Montserrat Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            base: '#0b0f14',
                            secondary: '#0f1720',
                            blue: '#3b82f6',
                            blueDark: '#2563eb',
                            blueLight: '#60a5fa',
                            input: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="broadcaster_login.css">
</head>
<body class="antialiased min-h-screen flex items-center justify-center selection:bg-brand-blue selection:text-white relative overflow-hidden">

    <!-- Decorative Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-brand-base"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full max-w-3xl max-h-[800px] bg-brand-blue/10 blur-[120px] rounded-full pointer-events-none"></div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-md p-6 relative z-10">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block text-3xl font-bold tracking-[0.2em] text-white hover:text-brand-blueLight transition-colors text-glow">
                ORYGIN
            </a>
            <p class="text-brand-blueLight text-sm font-medium tracking-widest uppercase mt-2">Creator Portal Setup</p>
        </div>

        <!-- Form Card -->
        <div class="glass-card p-8 shadow-2xl relative overflow-hidden transition-transform duration-300">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-blueLight via-brand-blue to-brand-blueDark"></div>
            
            <h2 class="text-2xl font-bold text-white mb-2">Complete Profile</h2>
            <p class="text-gray-400 text-sm mb-8 font-light">Set up your broadcaster identity to continue.</p>

            <form id="broadcaster-form" class="space-y-5">
                
                <!-- Full Name -->
                <div>
                    <label for="fullname" class="block text-xs font-medium text-brand-blueLight tracking-wider mb-2 uppercase">Full Name</label>
                    <input type="text" id="fullname" placeholder="e.g. Clayton J. Doe" required
                        class="w-full bg-brand-input/50 border border-white/10 rounded-lg p-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                </div>

                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-medium text-brand-blueLight tracking-wider mb-2 uppercase">Username</label>
                    <input type="text" id="username" placeholder="e.g. clay_ton00777" required
                        class="w-full bg-brand-input/50 border border-white/10 rounded-lg p-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                </div>
                
                <!-- Birth Date -->
                <div>
                    <label for="dob" class="block text-xs font-medium text-brand-blueLight tracking-wider mb-2 uppercase">Date of Birth</label>
                    <input type="date" id="dob" required
                        class="w-full bg-brand-input/50 border border-white/10 rounded-lg p-3 text-gray-300 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all custom-date">
                </div>

                <!-- YouTube Credentials -->
                <div>
                    <label for="youtube-id" class="block text-xs font-medium text-brand-blueLight tracking-wider mb-2 uppercase">YouTube Channel ID / Key</label>
                    <input type="text" id="youtube-id" placeholder="e.g. UC-..." required
                        class="w-full bg-brand-input/50 border border-white/10 rounded-lg p-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                    <p class="text-[10px] text-gray-500 mt-1">Used for broadcast authorization and stream sealing.</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-brand-blue to-brand-blueDark text-white py-3.5 rounded-xl hover-glow font-bold tracking-widest text-sm transition-transform hover:-translate-y-0.5 uppercase shadow-[0_0_20px_rgba(59,130,246,0.3)] mt-8">
                    Complete Setup
                </button>
            </form>
        </div>
        
        <div class="text-center mt-6">
            <a href="login.html" class="text-gray-500 hover:text-white text-xs tracking-wider transition-colors">
                &larr; Back to Login
            </a>
        </div>
    </main>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://coddjlrywyojgdmfkuph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZGRqbHJ5d3lvamdkbWZrdXBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjgxMDMsImV4cCI6MjA5MjQ0NDEwM30.wXavTOBoYco3WE1iI3RRXKdZX5WKejQUV_AO3BhvftY";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('broadcaster-form');
        const errorMessage = document.getElementById('error-message');

        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('broadcasters').select('*').eq('email', user.email).single();
                if (profile) {
                    window.location.href = 'broadcast_initial.html';
                }
            } else {
                window.location.href = 'login.html?role=broadcaster';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const username = document.getElementById('username').value;
            const dob = document.getElementById('dob').value;
            const youtubeId = document.getElementById('youtube-id').value;
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.textContent = "Saving Profile...";
            submitBtn.disabled = true;

            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) throw new Error("No active session. Please log in again.");

                const profileData = {
                    email: user.email,
                    fullname,
                    username,
                    dob,
                    youtube_id: youtubeId,
                    created_at: new Date()
                };

                const { error } = await supabase.from('broadcasters').insert([profileData]);
                if (error) throw error;

                // Save for immediate use
                localStorage.setItem('broadcaster_id', username);
                localStorage.setItem('broadcaster_name', fullname);

                setTimeout(() => {
                    window.location.href = 'broadcast_initial.html';
                }, 800);
            } catch (err) {
                alert("Error: " + err.message);
                submitBtn.textContent = "Complete Setup";
                submitBtn.disabled = false;
            }
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
            
            // Shake effect
            const card = document.querySelector('.glass-card');
            card.style.transform = 'translateX(10px)';
            setTimeout(() => card.style.transform = 'translateX(-10px)', 100);
            setTimeout(() => card.style.transform = 'translateX(10px)', 200);
            setTimeout(() => card.style.transform = 'translateX(0)', 300);
        }
    </script>
</body>
</html>
