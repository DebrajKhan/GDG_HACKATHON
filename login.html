<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP | Sign In</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="galaxy-background">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
        <div class="nebula"></div>
    </div>

    <div class="split-layout">
        <!-- Left Section: Info -->
        <div class="left-section">
            <a href="dashboard.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to home
            </a>
            <div class="left-content">
                <h1 class="info-title">Secure your <span class="gradient-text">Identity.</span></h1>
                <p class="info-desc">
                    Ban the usage of 3rd party apps and make your own content safe. Take full control over your digital
                    footprint.
                </p>
                <div class="decorative-circle">
                    <div class="inner-circle"></div>
                    <div class="orbit-dot"></div>
                </div>
            </div>
        </div>

        <!-- Right Section: Login Form -->
        <div class="right-section">
            <div class="login-card glass-card">
                <div class="login-header">
                    <h2 class="welcome-title">Hi twin</h2>
                    <p class="welcome-subtitle">Sign in to continue to your dashboard</p>
                </div>

                <!-- Role Toggle -->
                <div class="role-toggle">
                    <input type="radio" id="role-protection" name="role" value="protection" checked>
                    <label for="role-protection" class="role-btn">Content Protection</label>

                    <input type="radio" id="role-broadcaster" name="role" value="broadcaster">
                    <label for="role-broadcaster" class="role-btn">Broadcaster</label>
                </div>

                <!-- Google Login -->
                <button class="google-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                            <path fill="#4285F4"
                                d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z" />
                            <path fill="#34A853"
                                d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z" />
                            <path fill="#FBBC05"
                                d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z" />
                            <path fill="#EA4335"
                                d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z" />
                        </g>
                    </svg>
                    Continue with Google
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Form -->
                <form class="login-form">
                    <div class="input-group">
                        <label for="email" class="sr-only">Email address</label>
                        <input type="email" id="email" class="glass-input" placeholder="Email address" required>
                    </div>
                    <div class="input-group">
                        <label for="password" class="sr-only">Password</label>
                        <input type="password" id="password" class="glass-input" placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn-primary sign-in-btn">Sign In</button>
                </form>

                <p class="signup-prompt">
                    Don't have an account? <a href="#" class="signup-link">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        .info-title .gradient-text {
            display: block;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
            animation: holographicPulse 4s infinite ease-in-out;
        }

        @keyframes holographicPulse {
            0%, 100% { opacity: 0.8; transform: skewX(-2deg); }
            50% { opacity: 1; transform: skewX(2deg); filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.6)); }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase
        const SUPABASE_URL = "https://coddjlrywyojgdmfkuph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZGRqbHJ5d3lvamdkbWZrdXBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjgxMDMsImV4cCI6MjA5MjQ0NDEwM30.wXavTOBoYco3WE1iI3RRXKdZX5WKejQUV_AO3BhvftY";
        
        // Use the global 'supabase' object to create the client
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.querySelector('.login-form');
        const googleBtn = document.querySelector('.google-btn');
        const submitBtn = loginForm.querySelector('button');
        const signupLink = document.querySelector('.signup-link');
        const welcomeTitle = document.querySelector('.welcome-title');
        const welcomeSubtitle = document.querySelector('.welcome-subtitle');
        let isSignup = false;

        // --- TOGGLE MODE ---
        signupLink.addEventListener('click', (e) => {
            e.preventDefault();
            isSignup = !isSignup;
            welcomeTitle.textContent = isSignup ? "Create Account" : "Hi twin";
            welcomeSubtitle.textContent = isSignup ? "Register to start securing your assets" : "Sign in to continue to your dashboard";
            submitBtn.textContent = isSignup ? "Create Vault Access" : "Sign In";
            signupLink.textContent = isSignup ? "Log in instead" : "Sign up";
        });

        // --- GOOGLE LOGIN ---
        googleBtn.addEventListener('click', async () => {
            const isBroadcaster = document.getElementById('role-broadcaster').checked;
            if (isBroadcaster) {
                window.location.href = 'broadcaster_login.html';
                return;
            }

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) alert("Google Auth Error: " + error.message);
        });

        // --- EMAIL/PASS LOGIN & REGISTER ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.textContent = isSignup ? "CREATING ACCOUNT..." : "VERIFYING IDENTITY...";
            submitBtn.disabled = true;

            try {
                if (isSignup) {
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    
                    // Sync with our public users table
                    await supabaseClient.from('users').insert([{ email, last_login: new Date() }]);
                    
                    // If signup is successful, Supabase usually logs you in automatically
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    // Update 'last_login' 
                    await supabaseClient.from('users').update({ last_login: new Date() }).eq('email', email);
                    
                    window.location.href = 'index.html';
                }
            } catch (err) {
                alert("Auth Error: " + err.message);
            } finally {
                submitBtn.textContent = isSignup ? "Create Vault Access" : "Sign In";
                submitBtn.disabled = false;
            }
        });

        // --- AUTO-RETRIEVE SESSION ---
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>

</html>
